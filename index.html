<script>
/* =========================================================
   CACHE DE KM - Supabase + localStorage
   1) Rode o SQL enviado no Supabase.
   2) Preencha SUPABASE_URL e SUPABASE_ANON_KEY abaixo.
   3) Se deixar vazio, o sistema usa somente cache local do navegador.
========================================================= */
var SUPABASE_URL = "https://ndpfmjetlvcujhgphqoi.supabase.co";
var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kcGZtamV0bHZjdWpoZ3BocW9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NDk2MTksImV4cCI6MjA5ODAyNTYxOX0.M1ypP2OOSGOojCGWfq-X1UNJzfYhD8a-J47QtR6Qw00";


function normalizarCoord(coord){
  return [Number(coord[0]).toFixed(6), Number(coord[1]).toFixed(6)];
}

function chaveRota(a,b){
  const A = normalizarCoord(a).join(",");
  const B = normalizarCoord(b).join(",");
  return `${A}|${B}`;
}

async function buscarKmSupabase(chave){
  if(!SUPABASE_URL || !SUPABASE_ANON_KEY) return null;
  try{
    const url = `${SUPABASE_URL}/rest/v1/cache_rotas_km?route_key=eq.${encodeURIComponent(chave)}&select=km&limit=1`;
    const r = await fetch(url, {
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
      }
    });
    if(!r.ok) return null;
    const dados = await r.json();
    if(dados && dados.length && Number(dados[0].km) > 0) return Number(dados[0].km);
  }catch(e){ console.warn("Falha ao buscar km no Supabase", e); }
  return null;
}

async function salvarKmSupabase(chave,a,b,km,origemTela){
  if(!SUPABASE_URL || !SUPABASE_ANON_KEY) return;
  try{
    const A = normalizarCoord(a);
    const B = normalizarCoord(b);
    const resp = await fetch(`${SUPABASE_URL}/rest/v1/cache_rotas_km`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates,return=minimal"
      },
      body: JSON.stringify({
        route_key: chave,
        origem_lng: Number(A[0]),
        origem_lat: Number(A[1]),
        destino_lng: Number(B[0]),
        destino_lat: Number(B[1]),
        km: Number(km),
        origem_tela: origemTela || null,
        atualizado_em: new Date().toISOString()
      })
    });
    if(!resp.ok){
      const erro = await resp.text();
      console.warn("Supabase não salvou a rota:", erro);
    }
  }catch(e){ console.warn("Falha ao salvar km no Supabase", e); }
}

async function getKmComCache(a,b,origemTela){
  const chave = chaveRota(a,b);
  const localKey = `km_cache_${chave}`;

  // 1) Busca primeiro no cache local do navegador
  const cacheLocal = localStorage.getItem(localKey);
  if(cacheLocal && Number(cacheLocal) > 0){
    // Se o navegador já tinha a rota salva antes de configurar o Supabase,
    // sincroniza também com a base para outros usuários aproveitarem.
    await salvarKmSupabase(chave,a,b,Number(cacheLocal),origemTela);
    return Number(cacheLocal);
  }

  // 2) Busca no Supabase
  const cacheSupabase = await buscarKmSupabase(chave);
  if(cacheSupabase){
    localStorage.setItem(localKey, String(cacheSupabase));
    return cacheSupabase;
  }

  // 3) Se não achou, consulta API de rota
  const r = await fetch(`https://api.openrouteservice.org/v2/directions/driving-car`,{
    method:"POST",
    headers:{"Authorization":API_KEY,"Content-Type":"application/json"},
    body:JSON.stringify({coordinates:[a,b]})
  });
  const d = await r.json();
  const km = d.routes[0].summary.distance/1000;

  // 4) Salva para próximas consultas
  localStorage.setItem(localKey, String(km));
  await salvarKmSupabase(chave,a,b,km,origemTela);

  return km;
}
</script>

<script>
const API_KEY="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjkwZmEzNGRmOTZhMDQ4OTk4Zjk1NDY2NDgzODU0MTMyIiwiaCI6Im11cm11cjY0In0=";

async function carregarDolarBCB(){
try{
let hoje = new Date();
let mes = String(hoje.getMonth()+1).padStart(2,'0');
let dia = String(hoje.getDate()).padStart(2,'0');
let ano = hoje.getFullYear();

let url = `https://olinda.bcb.gov.br/olinda/servico/PTAX/versao/v1/odata/CotacaoDolarPeriodo(dataInicial=@dataInicial,dataFinalCotacao=@dataFinalCotacao)?@dataInicial='01-01-${ano}'&@dataFinalCotacao='${mes}-${dia}-${ano}'&$top=1&$orderby=dataHoraCotacao desc&$format=json`;

let r = await fetch(url);
let j = await r.json();

if(j.value && j.value.length){
document.getElementById("dolar").value = j.value[0].cotacaoVenda.toFixed(4);
}else{
document.getElementById("dolar").value = "5.2800"; 
}
}catch(e){
document.getElementById("dolar").value = "5.2800";
}
}

carregarDolarBCB();

let modo="normal";
function setModo(m,el){
modo=m;
document.querySelectorAll(".modo-btn").forEach(b=>b.classList.remove("ativo"));
el.classList.add("ativo");
document.getElementById("manualFields").style.display=m==="manual"?"block":"none";
}

let cidades={origem:null,aduana:null,destino:null};

function auto(id,sug,key){
let i=document.getElementById(id);
let box=document.getElementById(sug);

i.addEventListener("input",async()=>{
cidades[key]=null;
if(i.value.length<3){box.innerHTML="";return;}

let r=await fetch(`https://api.openrouteservice.org/geocode/autocomplete?api_key=${API_KEY}&text=${i.value}`);
let d=await r.json();

box.innerHTML="";
(d.features||[]).slice(0,5).forEach(c=>{
let div=document.createElement("div");
div.innerText=c.properties.label;
div.onclick=()=>{
i.value=c.properties.label;
cidades[key]=c.geometry.coordinates;
box.innerHTML="";
};
box.appendChild(div);
});
});
}

auto("origem","sugOrigem","origem");
auto("aduana","sugAduana","aduana");
auto("destino","sugDestino","destino");

async function getKm(a,b){
return await getKmComCache(a,b,"dados");
}

let paises=["Argentina","Chile","Uruguai","Peru","Paraguai"];
let selecionado="Argentina";

let dropdown=document.getElementById("dropdownPais");
dropdown.onclick=()=>dropdown.classList.toggle("open");

function renderLista(){
let lista=document.getElementById("listaPaises");
lista.innerHTML="";
paises.forEach(p=>{

div.innerText=p;

});
}

tag.innerHTML=`${selecionado} ✕`;
tag.onclick=(e)=>{e.stopPropagation();selecionado=null;renderTags();};

}

renderTags();

function getPais(p){
return {
Argentina:{crt:"AR1780",mic:"AR1780"},
Chile:{crt:"CL5470",mic:"CL5470"},
Uruguai:{crt:"UY6480",mic:"UY6480"},
Peru:{crt:"PE33690",mic:"PE33690"},
Paraguai:{crt:"PY21300",mic:"PY21300"}
}[p];
}

async function calcular(){
let res=document.getElementById("resultado");
res.style.opacity = "1";
res.innerHTML="Processando rotas e valores...";

try{
if(!cidades.origem||!cidades.aduana||!cidades.destino){
res.innerHTML="<span style='color:#fca5a5;'>Selecione cidades válidas sugeridas na lista.</span>";
return;
}

let km1=await getKm(cidades.origem,cidades.aduana);
let km2=await getKm(cidades.aduana,cidades.destino);
let total=km1+km2;

let mercadoria=parseFloat(document.getElementById("mercadoria").value)||0;
let adv=parseFloat(document.getElementById("adv").value)||0;
let freteBRL=parseFloat(document.getElementById("freteBRL").value)||0;
let dolar=parseFloat(document.getElementById("dolar").value)||1;

let freteUSD=freteBRL/dolar;

let seguroInput=parseFloat(document.getElementById("seguroManual").value);
let seguro=(modo==="manual" && !isNaN(seguroInput))? seguroInput : mercadoria*(adv/100);

let freteBase=freteUSD;
let freteTotal=0;

if(modo==="normal"){ freteBase=freteUSD-seguro; freteTotal=freteUSD; }
else if(modo==="seguro"){ freteBase=freteUSD; freteTotal=freteUSD+seguro; }
else{ freteBase=freteUSD; freteTotal=freteUSD+seguro; }

let extManual=parseFloat(document.getElementById("freteExternoManual").value);
let intManual=parseFloat(document.getElementById("freteInternoManual").value);

let externo=0, interno=0;

if(modo==="manual"){
if(isNaN(extManual) && isNaN(intManual)){ externo=freteBase*(km1/total); interno=freteBase*(km2/total); }
else if(!isNaN(extManual) && !isNaN(intManual)){ externo=extManual; interno=intManual; }
else if(!isNaN(extManual)){ externo=extManual; interno=freteBase-extManual; }
else{ interno=intManual; externo=freteBase-intManual; }
}else{
externo=freteBase*(km1/total); interno=freteBase*(km2/total);
}

let d=getPais(selecionado);
let frota=document.getElementById("frota").value || "-";
let aduanaDesc=document.getElementById("aduana").value || "-";

res.innerHTML=`
<div class="pais-item">
<b style="color:var(--marvel-accent); font-size:18px;">${selecionado}</b><br>
<span style="opacity:0.8; font-size:12px;">CRT: ${d.crt} &nbsp;|&nbsp; MIC: ${d.mic}</span><br>
<span style="opacity:0.8; font-size:12px;">Frota: ${frota}</span><br><br>

<div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:8px; margin-bottom:15px;">
  <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>Externo:</span> <b>$ ${externo.toFixed(2)}</b></div>
  <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>Interno:</span> <b>$ ${interno.toFixed(2)}</b></div>
  <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>Seguro:</span> <b>$ ${seguro.toFixed(2)}</b></div>
  <div style="display:flex; justify-content:space-between; border-top:1px solid rgba(255,255,255,0.2); padding-top:8px; margin-top:8px; color:var(--marvel-accent);">
    <span>Frete Total:</span> <b>$ ${freteTotal.toFixed(2)}</b>
  </div>
</div>

Valor Mercadoria: $ ${mercadoria.toFixed(2)}<br>
Aduana Selecionada: ${aduanaDesc}
</div>
`;
}catch(e){
res.innerHTML="<span style='color:#fca5a5;'>Erro ao calcular. Verifique a conexão com a API.</span>";
}
}

function montarResultadoHtmlParaCopiar(){
  const resultado = document.getElementById("resultado");
  if(!resultado || !resultado.innerText.trim() || resultado.innerText.includes("Aguardando")) return null;

  const wrapper = document.createElement("div");
  wrapper.style.fontFamily = "Segoe UI, Arial, sans-serif";
  wrapper.style.background = "#002855";
  wrapper.style.color = "#ffffff";
  wrapper.style.padding = "18px";
  wrapper.style.borderRadius = "10px";
  wrapper.style.width = "360px";
  wrapper.style.boxSizing = "border-box";

  const titulo = document.createElement("div");
  titulo.innerHTML = "<b>Resultado Operacional</b>";
  titulo.style.fontSize = "16px";
  titulo.style.marginBottom = "12px";
  titulo.style.paddingBottom = "10px";
  titulo.style.borderBottom = "1px solid rgba(255,255,255,0.18)";
  wrapper.appendChild(titulo);

  const conteudo = resultado.cloneNode(true);
  conteudo.style.opacity = "1";
  conteudo.style.marginTop = "0";
  wrapper.appendChild(conteudo);

  return wrapper.outerHTML;
}

function copiarResultadoFormatado(){
  const html = montarResultadoHtmlParaCopiar();
  const texto = document.getElementById("resultado").innerText;

  if(!html){ alert("Calcule primeiro antes de copiar."); return; }

  if(navigator.clipboard && window.ClipboardItem){
    const item = new ClipboardItem({
      "text/html": new Blob([html], {type:"text/html"}),
      "text/plain": new Blob([texto], {type:"text/plain"})
    });

    navigator.clipboard.write([item]).then(()=>{
      const btn = document.querySelector(".btn-success");
      btn.innerHTML = "✅ Copiado!";
      setTimeout(()=>{ btn.innerHTML = "📋 Copiar"; }, 2000);
    }).catch(()=>copiarTextoSimples(texto));
  }else{
    copiarTextoSimples(texto);
  }
}

function copiarTextoSimples(texto){
  navigator.clipboard.writeText(texto).then(()=>{
    alert("Copiado como texto simples. Para manter o quadrado formatado, cole em e-mail, Word, Google Docs ou sistema que aceite HTML.");
  }).catch(()=>alert("Não foi possível copiar."));
}

</script>

<!DOCTYPE html>

<html lang="pt-BR"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>Rateio - Cotações PRO</title>

<style>
:root {
  --marvel-dark: #002855;
  --marvel-blue: #004b9c;
  --marvel-accent: #facc15;
  --bg-light: #f4f6f9;
  --text-main: #374151;
  --border-color: #d1d5db;
}
body { margin:0; font-family:'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background:var(--bg-light); color:var(--text-main); }
.main { padding: 40px; display: flex; justify-content: center;}
.grid { display: grid; grid-template-columns: 550px 400px; gap: 30px; align-items: start; max-width: 1000px; width: 100%;}

/* Cards */
.card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); border: 1px solid #e5e7eb;}
.resultado-box { background: var(--marvel-dark); color: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,40,85,0.2); min-height: 400px; box-sizing: border-box;}

/* Typography */
h3 { color: var(--marvel-dark); margin-top: 0; margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid var(--bg-light); padding-bottom: 12px;}
h4 { color: var(--marvel-dark); margin-top: 25px; margin-bottom: 12px; font-size: 15px; font-weight: bold;}
.resultado-box h3 { color: white; border-bottom: none; padding-bottom: 0; margin-bottom: 0;}

/* Inputs */
input { width:100%; padding:12px; margin-bottom:15px; border:1px solid var(--border-color); border-radius:6px; font-size:14px; box-sizing: border-box; transition: all 0.2s; background: #f9fafb;}
input:focus { outline: none; border-color: var(--marvel-blue); box-shadow: 0 0 0 3px rgba(0, 75, 156, 0.1); background: white;}
.row { display:flex; gap:15px; }

/* Buttons */
.btn-primary { width: 100%; padding: 14px; background: var(--marvel-blue); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; margin-top: 15px; transition: background 0.2s;}
.btn-primary:hover { background: #003a7a; }
.btn-secondary { padding: 10px 15px; background: var(--bg-light); color: var(--marvel-dark); border: 1px dashed #9ca3af; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; margin-bottom: 15px; transition: all 0.2s; width: 100%;}
.btn-secondary:hover { background: #e5e7eb; border-color: var(--marvel-blue); }
.btn-success { background:#22c55e; color:white; border:none; padding:10px 15px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:bold; transition: background 0.2s; display: flex; align-items: center; gap: 5px;}
.btn-success:hover { background:#16a34a; }

/* Faturas */
.fatura-row {display:flex; gap:10px; margin-bottom:10px; align-items:center; background: var(--bg-light); padding: 10px; border-radius: 6px; border: 1px solid var(--border-color);}
.fatura-row input {flex:1; margin-bottom: 0; padding: 10px; background: white;}
.remove-btn {background:#ef4444; color:white; border:none; padding:10px 12px; border-radius:6px; cursor:pointer; transition: background 0.2s; font-weight: bold;}
.remove-btn:hover {background:#dc2626;}

/* Dropdowns & Tags */
.suggestions {background:white; border:1px solid var(--border-color); border-radius: 6px; position:absolute; z-index:10; width:100%; max-height:180px; overflow:auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
.suggestions div {padding:10px 12px; cursor:pointer; font-size: 13px;}
.suggestions div:hover {background:var(--bg-light); color: var(--marvel-blue);}
.dropdown {position:relative; border:1px solid var(--border-color); border-radius:6px; padding:8px; background:#f9fafb; cursor:pointer; margin-bottom:15px; min-height: 20px;}
.dropdown-box {display:flex; flex-wrap:wrap; gap:6px;}
.dropdown-list {display:none; position:absolute; top:100%; left:0; right:0; background:white; border:1px solid var(--border-color); border-radius: 6px; max-height:180px; overflow:auto; z-index:20; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 4px;}
.dropdown.open .dropdown-list {display:block;}
.dropdown-item {padding:10px 12px; font-size: 14px;}
.dropdown-item:hover {background:var(--bg-light); color: var(--marvel-blue);}
.tag { background:var(--marvel-blue); color:white; padding:6px 12px; border-radius:20px; font-size:12px; cursor:pointer; font-weight: 600;}
.pais-item {border-bottom:1px solid rgba(255,255,255,0.1); padding:15px 0; font-size: 14px; line-height: 1.6;}
</style>
</head>

<body>

<div class="main">
<div class="grid">

<div class="card">
<h3>RATEIO DE FATURAS</h3>

<div style="position:relative;">
<input id="origem" placeholder="Origem da Carga" autocomplete="off">
<div id="sugOrigem" class="suggestions"></div>
</div>

<div style="position:relative;">
<input id="aduana" placeholder="Aduana / Fronteira" autocomplete="off">
<div id="sugAduana" class="suggestions"></div>
</div>

<div style="position:relative;">
<input id="destino" placeholder="Destino Base" autocomplete="off">
<div id="sugDestino" class="suggestions"></div>
</div>

<div class="row">
<input id="dolar" type="number" placeholder="Cotação Dólar">
<input id="adv" type="number" placeholder="ADV (%)">
</div>

<input id="freteBRL" type="number" placeholder="Frete Total (R$)">

<h4>Faturas</h4>
<div id="faturas"><div class="fatura-row">
<input placeholder="Fatura #" class="fat-num">
<input type="number" placeholder="Peso" class="fat-peso">
<input type="number" placeholder="Mercadoria USD" class="fat-merc">
<input type="number" placeholder="Adic. R$" class="fat-add">
<button class="remove-btn" onclick="this.parentElement.remove()">✕</button>
</div></div>
<button class="btn-secondary" onclick="addFatura()">+ Adicionar Nova Fatura</button>

<h4>País de Destino</h4>
<div class="dropdown" id="dropdownPais">
<div class="dropdown-box" id="tags"><div class="tag">Argentina ✕</div></div>
<div class="dropdown-list" id="listaPaises"><div class="dropdown-item">Argentina</div><div class="dropdown-item">Chile</div><div class="dropdown-item">Uruguai</div><div class="dropdown-item">Peru</div><div class="dropdown-item">Paraguai</div></div>
</div>

<button class="btn-primary" onclick="calcular()">Processar Rateio</button>

</div>

<div class="resultado-box">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; gap:10px;">
  <h3 style="margin:0;border-bottom:none;padding-bottom:0;">Resultado</h3>
  <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
    <button class="btn-success btn-copy-resultado" onclick="copiarResultadoRateioFormatado()">
      📄 Copiar Resultado
    </button>
    <button class="btn-success btn-copy-faturamento" onclick="copiarFaturamento()">
      📋 Copiar p/ Faturamento
    </button>
  </div>
</div>
<div id="resultado" style="font-size: 14px; opacity: 0.8;">Aguardando parâmetros...</div>
</div>

</div>
</div>

<script>
const API_KEY="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjkwZmEzNGRmOTZhMDQ4OTk4Zjk1NDY2NDgzODU0MTMyIiwiaCI6Im11cm11cjY0In0=";

async function carregarDolarBCB(){
try{
let hoje = new Date();
let mes = String(hoje.getMonth()+1).padStart(2,'0');
let dia = String(hoje.getDate()).padStart(2,'0');
let ano = hoje.getFullYear();

let url = `https://olinda.bcb.gov.br/olinda/servico/PTAX/versao/v1/odata/CotacaoDolarPeriodo(dataInicial=@dataInicial,dataFinalCotacao=@dataFinalCotacao)?@dataInicial='01-01-${ano}'&@dataFinalCotacao='${mes}-${dia}-${ano}'&$top=1&$orderby=dataHoraCotacao desc&$format=json`;

let r = await fetch(url);
let j = await r.json();

if(j.value && j.value.length){
let valor = j.value[0].cotacaoVenda;
document.getElementById("dolar").value = valor.toFixed(4);
}else{
document.getElementById("dolar").value = "5.2800";
}
}catch(e){
document.getElementById("dolar").value = "5.2800";
}
}

carregarDolarBCB();
const dolarInput = document.getElementById("dolar");
dolarInput.addEventListener("blur", () => {
  if(dolarInput.value) dolarInput.value = parseFloat(dolarInput.value).toFixed(4);
});

let cidades={origem:null,aduana:null,destino:null};

function auto(id,sug,key){
let i=document.getElementById(id);
let box=document.getElementById(sug);

i.addEventListener("input",async()=>{
cidades[key]=null;
if(i.value.length<3){box.innerHTML="";return;}
let r=await fetch(`https://api.openrouteservice.org/geocode/autocomplete?api_key=${API_KEY}&text=${i.value}`);
let d=await r.json();
box.innerHTML="";
(d.features||[]).slice(0,5).forEach(c=>{
let div=document.createElement("div");
div.innerText=c.properties.label;
div.onclick=()=>{ i.value=c.properties.label; cidades[key]=c.geometry.coordinates; box.innerHTML=""; };
box.appendChild(div);
});
});
}

auto("origem","sugOrigem","origem");
auto("aduana","sugAduana","aduana");
auto("destino","sugDestino","destino");

async function getKm(a,b){
return await getKmComCache(a,b,"rateio");
}

let paises=["Argentina","Chile","Uruguai","Peru","Paraguai"];
let selecionado="Argentina";
let dropdown=document.getElementById("dropdownPais");
dropdown.onclick=()=>dropdown.classList.toggle("open");

function renderLista(){
let lista=document.getElementById("listaPaises");
lista.innerHTML="";
paises.forEach(p=>{
let div=document.createElement("div");
div.className="dropdown-item";
div.innerText=p;
div.onclick=(e)=>{ e.stopPropagation(); selecionado=p; renderTags(); dropdown.classList.remove("open"); };
lista.appendChild(div);
});
}

function renderTags(){
let t=document.getElementById("tags");
t.innerHTML="";
if(!selecionado) return;
let tag=document.createElement("div");
tag.className="tag";
tag.innerHTML=`${selecionado} ✕`;
tag.onclick=(e)=>{ e.stopPropagation(); selecionado=null; renderTags(); };
t.appendChild(tag);
}

renderLista();
renderTags();

function getPais(p){
return { Argentina:{crt:"AR1780",mic:"AR1780"}, Chile:{crt:"CL5470",mic:"CL5470"}, Uruguai:{crt:"UY6480",mic:"UY6480"}, Peru:{crt:"PE33690",mic:"PE33690"}, Paraguai:{crt:"PY21300",mic:"PY21300"} }[p];
}

function addFatura(){
let div=document.createElement("div");
div.className="fatura-row";
div.innerHTML=`
<input placeholder="Fatura #" class="fat-num">
<input type="number" placeholder="Peso" class="fat-peso">
<input type="number" placeholder="Mercadoria USD" class="fat-merc">
<input type="number" placeholder="Adic. R$" class="fat-add">
<button class="remove-btn" onclick="this.parentElement.remove()">✕</button>
`;
document.getElementById("faturas").appendChild(div);
}

addFatura();

async function calcular(){
let res=document.getElementById("resultado");
res.style.opacity = "1";
res.innerHTML="Processando rateio...";

try{
if(!cidades.origem || !cidades.aduana || !cidades.destino){
  res.innerHTML="<span style='color:#fca5a5;'>Selecione rotas válidas da lista.</span>"; return;
}
if(!selecionado){ res.innerHTML="<span style='color:#fca5a5;'>Selecione um país.</span>"; return; }

let km1=await getKm(cidades.origem,cidades.aduana);
let km2=await getKm(cidades.aduana,cidades.destino);
let total=km1+km2;

let freteBRL=parseFloat(document.getElementById("freteBRL").value)||0;
let dolar=parseFloat(document.getElementById("dolar").value)||1;
let adv=parseFloat(document.getElementById("adv").value)||0;

let freteTotal=(freteBRL/dolar);

let linhas=document.querySelectorAll(".fatura-row");
let faturas=[];

linhas.forEach(l=>{
let numero=l.querySelector(".fat-num").value || "-";
let peso=parseFloat(l.querySelector(".fat-peso").value)||0;
let merc=parseFloat(l.querySelector(".fat-merc").value)||0;
let adicionalBRL=parseFloat(l.querySelector(".fat-add").value)||0;
if(peso>0)faturas.push({numero,peso,merc,adicionalBRL});
});

if(faturas.length === 0) {
  res.innerHTML="<span style='color:#fca5a5;'>Adicione pelo menos uma fatura com peso.</span>"; return;
}

let pesoTotal=faturas.reduce((s,f)=>s+f.peso,0);
let d=getPais(selecionado);
let html="";

faturas.forEach(f=>{
let proporcao=f.peso/pesoTotal;
let freteFatura=freteTotal*proporcao;

let adicionalUSD=f.adicionalBRL/dolar;
freteFatura+=adicionalUSD;
let freteFaturaBRL = freteFatura * dolar;

let seguro=f.merc*(adv/100);
let base=freteFatura-seguro;
if(base<0) base=0;

let ext=base*(km1/total);
let int=base*(km2/total);

html+=`<div class="pais-item">
<b style="color:var(--marvel-accent); font-size:16px;">${selecionado} - Fatura ${f.numero}</b><br>
<span style="opacity:0.8; font-size:12px;">CRT: ${d.crt} &nbsp;|&nbsp; MIC: ${d.mic}</span><br><br>

<div style="background:rgba(255,255,255,0.05); padding:12px; border-radius:8px; margin-bottom:12px;">
  <div style="display:flex; justify-content:space-between; margin-bottom:6px;"><span>Externo:</span> <b>$ ${ext.toFixed(2)}</b></div>
  <div style="display:flex; justify-content:space-between; margin-bottom:6px;"><span>Interno:</span> <b>$ ${int.toFixed(2)}</b></div>
  <div style="display:flex; justify-content:space-between; margin-bottom:6px;"><span>Seguro:</span> <b>$ ${seguro.toFixed(2)}</b></div>
  <div style="display:flex; justify-content:space-between; border-top:1px solid rgba(255,255,255,0.2); padding-top:6px; margin-top:6px; color:var(--marvel-accent);">
    <span>Frete Total (USD):</span> <b>$ ${freteFatura.toFixed(2)}</b>
  </div>
  <div style="display:flex; justify-content:space-between; margin-top:4px; font-size:12px; opacity:0.8;">
    <span>Convertido:</span> <span>R$ ${freteFaturaBRL.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>
  </div>
</div>

Valor Mercadoria: $ ${f.merc.toFixed(2)}<br>
Aduana: ${document.getElementById("aduana").value}
</div>`;
});

res.innerHTML=html;

}catch(e){
res.innerHTML="<span style='color:#fca5a5;'>Erro no cálculo. Verifique a conexão com a API.</span>";
}
}

function copiarFaturamento(){
let dolar = parseFloat(document.getElementById("dolar").value)||1;
let freteBRL=parseFloat(document.getElementById("freteBRL").value)||0;
let linhas=document.querySelectorAll(".fatura-row");
let faturas=[];

linhas.forEach(l=>{
let numero=l.querySelector(".fat-num").value || "-";
let peso=parseFloat(l.querySelector(".fat-peso").value)||0;
let adicional=parseFloat(l.querySelector(".fat-add").value)||0;
if(peso>0)faturas.push({numero,peso,adicional});
});

if(faturas.length === 0) { alert("Nenhuma fatura calculada."); return; }

let pesoTotal=faturas.reduce((s,f)=>s+f.peso,0);
let freteTotal = freteBRL / dolar;
let texto=""; let total=0;

faturas.forEach(f=>{
let proporcao=f.peso/pesoTotal;
let freteUSD = freteTotal*proporcao + (f.adicional/dolar);
let brl = freteUSD * dolar;
total += brl;
texto += `Fatura ${f.numero} - R$ ${brl.toLocaleString('pt-BR',{minimumFractionDigits:2})}\n`;
});

texto += `\nTOTAL: R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;

navigator.clipboard.writeText(texto).then(() => {
    let btn = document.querySelector('.btn-copy-faturamento');
    btn.innerHTML = "✅ Copiado!";
    setTimeout(() => { btn.innerHTML = "📋 Copiar p/ Faturamento"; }, 2000);
}).catch(err => alert("Erro ao copiar."));
}

function montarResultadoRateioHtmlParaCopiar(){
  const resultado = document.getElementById("resultado");
  if(!resultado || !resultado.innerText.trim() || resultado.innerText.includes("Aguardando") || resultado.innerText.includes("Processando")) return null;

  const wrapper = document.createElement("div");
  wrapper.style.fontFamily = "Segoe UI, Arial, sans-serif";
  wrapper.style.background = "#002855";
  wrapper.style.color = "#ffffff";
  wrapper.style.padding = "18px";
  wrapper.style.borderRadius = "10px";
  wrapper.style.width = "390px";
  wrapper.style.boxSizing = "border-box";

  const conteudo = resultado.cloneNode(true);
  conteudo.style.opacity = "1";
  conteudo.style.marginTop = "0";
  wrapper.appendChild(conteudo);

  return wrapper.outerHTML;
}

function copiarResultadoRateioFormatado(){
  const html = montarResultadoRateioHtmlParaCopiar();
  const texto = document.getElementById("resultado").innerText;

  if(!html){ alert("Calcule primeiro antes de copiar."); return; }

  if(navigator.clipboard && window.ClipboardItem){
    const item = new ClipboardItem({
      "text/html": new Blob([html], {type:"text/html"}),
      "text/plain": new Blob([texto], {type:"text/plain"})
    });

    navigator.clipboard.write([item]).then(()=>{
      const btn = document.querySelector(".btn-copy-resultado");
      btn.innerHTML = "✅ Copiado!";
      setTimeout(()=>{ btn.innerHTML = "📄 Copiar Resultado"; }, 2000);
    }).catch(()=>copiarTextoSimplesRateio(texto));
  }else{
    copiarTextoSimplesRateio(texto);
  }
}

function copiarTextoSimplesRateio(texto){
  navigator.clipboard.writeText(texto).then(()=>{
    alert("Copiado como texto simples. Para manter o quadrado formatado, cole em e-mail, Word, Google Docs ou sistema que aceite HTML.");
  }).catch(()=>alert("Não foi possível copiar."));
}

</script>



</body></html>
</template>

<script>
function abrirModulo(modulo, botao) {
  const frame = document.getElementById('frame');
  const tpl = document.getElementById(modulo === 'rateio' ? 'tplRateio' : 'tplDados');
  frame.srcdoc = tpl.innerHTML;
  document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('ativo'));
  botao.classList.add('ativo');
  localStorage.setItem('cotacoes_modulo_ativo', modulo);
}

window.addEventListener('DOMContentLoaded', () => {
  const modulo = localStorage.getItem('cotacoes_modulo_ativo') || 'dados';
  abrirModulo(modulo, document.getElementById(modulo === 'rateio' ? 'btnRateio' : 'btnDados'));
});
</script>
</body>
</html>
